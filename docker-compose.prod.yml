      context: .
      dockerfile: apps/identity-service/Dockerfile
    env_file: .env.production
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully
    restart: unless-stopped

