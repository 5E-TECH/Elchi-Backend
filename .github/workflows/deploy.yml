name: Elchi CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Build check
        run: |
          npx nest build api-gateway
          npx nest build logistics-service
          npx nest build order-service

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.SERVER_APP_PATH }}
            git config --global --add safe.directory ${{ secrets.SERVER_APP_PATH }} || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            if command -v docker-compose >/dev/null 2>&1; then
              compose() { docker-compose "$@"; }
            else
              compose() { docker compose "$@"; }
            fi

            compose -f docker-compose.prod.yml pull || true
            compose -f docker-compose.prod.yml down --remove-orphans
            compose -f docker-compose.prod.yml up -d --build --remove-orphans
            compose -f docker-compose.prod.yml ps
