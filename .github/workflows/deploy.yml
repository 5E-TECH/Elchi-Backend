name: Elchi CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 50m
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.SERVER_APP_PATH }}
            git fetch origin main
            git reset --hard origin/main
            cp -f .env.production .env
            docker compose -f docker-compose.prod.yml up -d postgres rabbitmq minio
            docker rm -f elchi-migration-runner backend_migration-runner_1 2>/dev/null || true
            docker compose -f docker-compose.prod.yml run --rm migration-runner sh -lc 'npm ci --include=dev && npm run db:prepare'
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
