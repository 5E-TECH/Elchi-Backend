name: Elchi CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Critical-path specs (observability/idempotency sprint) MUST pass
      # before a production deploy. Legacy specs still drift, so the full
      # suite runs too but non-blocking — a known-flaky legacy spec must
      # not block production. Mirrors the gating in ci.yml.
      - name: Critical-path unit tests (must pass)
        run: |
          npx jest \
            apps/finance-service/src/finance-service.service.spec.ts \
            apps/identity-service/src/auth/auth.service.spec.ts \
            apps/order-service/src/order-service.bulk-batch.spec.ts \
            --runInBand
        env:
          NODE_ENV: test

      - name: Full unit test suite (legacy specs may fail; non-blocking)
        run: npm run test:ci
        env:
          NODE_ENV: test
        continue-on-error: true

      - name: Build check
        run: |
          npx nest build api-gateway
          npx nest build logistics-service
          npx nest build order-service

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 50m
          script_stop: true
          script: |
            set -ex
            cd ${{ secrets.SERVER_APP_PATH }}
            git config --global --add safe.directory ${{ secrets.SERVER_APP_PATH }} || true
            cp -f .env.production /tmp/elchi-env-backup 2>/dev/null || true

            OLD_SHA="$(git rev-parse HEAD 2>/dev/null || true)"
            git fetch origin main
            NEW_SHA="$(git rev-parse origin/main)"

            APP_SERVICES="api-gateway identity-service order-service catalog-service logistics-service finance-service notification-service integration-service analytics-service branch-service investor-service file-service c2c-service search-service"
            DEPLOY_SERVICES=""
            DEPLOY_ALL=false
            RUN_MIGRATIONS=false

            if [ -z "$OLD_SHA" ]; then
              DEPLOY_ALL=true
            elif [ "$OLD_SHA" != "$NEW_SHA" ]; then
              git diff --name-only "$OLD_SHA" "$NEW_SHA" > /tmp/elchi-changed-files
              cat /tmp/elchi-changed-files

              if grep -Eq '^(libs/|package\.json$|package-lock\.json$|nest-cli\.json$|tsconfig.*\.json$|docker-compose\.prod\.yml$|\.github/workflows/deploy\.yml$)' /tmp/elchi-changed-files; then
                DEPLOY_ALL=true
              fi
              if grep -Eq '^(migrations/|scripts/init-schemas\.sql$)' /tmp/elchi-changed-files; then
                RUN_MIGRATIONS=true
              fi
              for service in $APP_SERVICES; do
                if grep -q "^apps/$service/" /tmp/elchi-changed-files; then
                  DEPLOY_SERVICES="$DEPLOY_SERVICES $service"
                fi
              done
            fi

            if [ "$DEPLOY_ALL" = true ]; then
              DEPLOY_SERVICES="$APP_SERVICES"
              RUN_MIGRATIONS=true
            fi

            git checkout -f main
            git reset --hard origin/main
            test -f .env.production || cp -f /tmp/elchi-env-backup .env.production

            docker compose -f docker-compose.prod.yml pull rabbitmq postgres minio cloudflared || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans rabbitmq postgres minio

            if [ "$RUN_MIGRATIONS" = true ]; then
              docker compose -f docker-compose.prod.yml up --build --force-recreate --abort-on-container-exit migration-runner
              docker compose -f docker-compose.prod.yml rm -f migration-runner || true
            fi

            if [ -n "$(echo "$DEPLOY_SERVICES" | xargs)" ]; then
              echo "Deploying services:$DEPLOY_SERVICES"
              docker compose -f docker-compose.prod.yml up -d --no-deps --build --remove-orphans $DEPLOY_SERVICES
            else
              echo "No application service changes detected; keeping running containers as-is."
            fi

            docker compose -f docker-compose.prod.yml up -d --no-deps cloudflared || true
            docker compose -f docker-compose.prod.yml ps
