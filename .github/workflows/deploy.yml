name: Elchi CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Critical-path specs (observability/idempotency sprint) MUST pass
      # before a production deploy. Legacy specs still drift, so the full
      # suite runs too but non-blocking — a known-flaky legacy spec must
      # not block production. Mirrors the gating in ci.yml.
      - name: Critical-path unit tests (must pass)
        run: |
          npx jest \
            apps/finance-service/src/finance-service.service.spec.ts \
            apps/identity-service/src/auth/auth.service.spec.ts \
            apps/order-service/src/order-service.bulk-batch.spec.ts \
            --runInBand
        env:
          NODE_ENV: test

      - name: Full unit test suite (legacy specs may fail; non-blocking)
        run: npm run test:ci
        env:
          NODE_ENV: test
        continue-on-error: true

      - name: Build check
        run: |
          npx nest build api-gateway
          npx nest build logistics-service
          npx nest build order-service

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 50m
          script_stop: true
          script: |
            set -ex
            cd ${{ secrets.SERVER_APP_PATH }}
            git config --global --add safe.directory ${{ secrets.SERVER_APP_PATH }} || true
            cp -f .env.production /tmp/elchi-env-backup 2>/dev/null || true
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main
            test -f .env.production || cp -f /tmp/elchi-env-backup .env.production
            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose -f docker-compose.prod.yml ps
